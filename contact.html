<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Easy Rent</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <a href="index.html" class="brand">Easy Rent</a>
            <nav class="navbar">
                <a href="index.html">Home</a>
                <a href="houses.html">Houses</a>
                <a href="hostels.html">Hostels</a>
                <a href="login.html">Login</a>
            </nav>
        </div>
    </header>

    <main class="container contact-page">
        <section class="section">
            <div class="section-heading">
                <h2>Contact Us</h2>
                <p>Send a message and our support team will respond shortly.</p>
            </div>
            <div class="contact-grid">
                <div class="contact-info">
                    <h3>Office Address</h3>
                    <p>123 Rental Street, City Center, State</p>
                    <h3>Email</h3>
                    <p>support@easyrent.com</p>
                    <h3>Phone</h3>
                    <p>+1 (234) 567-8900</p>
                </div>
                <form action="contact.php" method="post" id="contactForm" class="contact-form">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" name="name" required>
                    <label for="email">Your Email</label>
                    <input type="email" id="email" name="email" required>
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                    <button type="submit" class="btn btn-primary">Send Message</button>
                </form>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container footer-content">
            <p>© 2026 Easy Rent.</p>
        </div>
    </footer>
    <script src="js/script.js"></script>
</body>
</html>
